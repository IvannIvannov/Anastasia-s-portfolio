<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGC</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" />

    <link rel="stylesheet" href="ugc.css" />
    <link rel="stylesheet" href="/nav/nav.css">
    <link rel="stylesheet" href="/footer/footer.css">

</head>

<body>
    <div id="nav-placeholder"></div>

    <nav class="ugc-nav">
        <div class="ugc-nav__inner">
            <div class="ugc-nav__title">UGC</div>

            <ul class="ugc-nav__menu">
                <li><a href="#cosmetics">Cosmetics</a></li>
                <li><a href="#accessories-outfits">Accessories & Outfits</a></li>
                <li><a href="#procedures">Procedures</a></li>
                <li><a href="#unboxing">Unboxing</a></li>

                <li><a href="#restaurants-hotels">Restaurants & Hotels</a></li>
                <li><a href="#misc">Other</a></li>

            </ul>
        </div>
    </nav>

    <section class="ugc-videos" id="products">
        <h2 class="ugc-videos__title">Examples: Products</h2>

        <div class="phones">
            <article class="phone">
                <div class="phone__screen">
                    <video controls playsinline preload="metadata" poster="/videos/posters/p1.jpg">
                        <source src="/images/test.mp4" type="video/mp4">
                    </video>
                </div>
            </article>

            <article class="phone">
                <div class="phone__screen">
                    <video controls playsinline preload="metadata" poster="/videos/posters/p2.jpg">
                        <source src="/videos/products/video2.mp4" type="video/mp4">
                    </video>
                </div>
            </article>

            <article class="phone">
                <div class="phone__screen">
                    <video controls playsinline preload="metadata" poster="/videos/posters/p3.jpg">
                        <source src="/videos/products/video3.mp4" type="video/mp4">
                    </video>
                </div>
            </article>

            <article class="phone">
                <div class="phone__screen">
                    <video controls playsinline preload="metadata" poster="/videos/posters/p4.jpg">
                        <source src="/videos/products/video4.mp4" type="video/mp4">
                    </video>
                </div>
            </article>

            <article class="phone">
                <div class="phone__screen">
                    <video controls playsinline preload="metadata" poster="/videos/posters/p5.jpg">
                        <source src="/videos/products/video5.mp4" type="video/mp4">
                    </video>
                </div>
            </article>
        </div>

    <div id="footer-placeholder"></div>

    <script src="/nav/nav.js"></script>
    <script src="/footer/footer.js"></script>
