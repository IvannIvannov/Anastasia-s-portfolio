<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Media</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" />

    <link rel="stylesheet" href="social.css" />
    <link rel="stylesheet" href="/nav/nav.css">
    <link rel="stylesheet" href="/footer/footer.css">
    <link rel="stylesheet" href="/styles/global.css">
</head>

<body>

    <div id="nav-placeholder"></div>

    <main class="social-page">

        <!-- LEFT -->
        <section class="left">

            <h1 class="big-title fade-up">SOCIAL MEDIA</h1>

            <div class="stats">

                <div class="stat fade-up">
                    <div class="stat-number" data-target="2400">0</div>
                    <div class="stat-label">YouTube Subscribers</div>
                </div>

                <div class="stat fade-up">
                    <div class="stat-number" data-target="2000">0</div>
                    <div class="stat-label">Instagram Followers</div>
                </div>

                <div class="stat fade-up">
                    <div class="stat-number" data-target="70">0</div>
                    <div class="stat-label">Satisfied clients</div>
                </div>

                <div class="stat fade-up">
                    <div class="stat-number" data-target="200">0</div>
                    <div class="stat-label">Completed projects</div>
                </div>

            </div>

        </section>

        <!-- RIGHT -->
        <section class="right">

            <div class="mockup fade-up">
                <img src="/images/ig.png" alt="Instagram profile preview">
            </div>

            <div class="mockup fade-up">
                <img src="/images/youtube.png" alt="YouTube channel preview">
            </div>

        </section>

    </main>

    <div id="footer-placeholder"></div>

    <!-- NAV -->
    <script src="/nav/nav.js"></script>

    <!-- FOOTER -->
    <script src="/footer/footer.js"></script>

    <!-- PAGE ANIMATIONS -->
    <script src="/scripts/social.js"></script>

</body>

</html>
