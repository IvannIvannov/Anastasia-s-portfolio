<!DOCTYPE html>
<html lang="bg">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакти</title>

    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="/nav/nav.css">
    <link rel="stylesheet" href="/footer/footer.css">
    <link rel="stylesheet" href="/styles/global.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div id="nav-placeholder"></div>

    <main class="contact-page">

        <section class="contact-hero">

            <div class="contact-visual">
                <div class="contact-visual__shape"></div>
                <div class="contact-visual__dots"></div>

                <figure class="contact-image">
                    <img src="/images/pug.jpg" alt="Anastasia Paskaleva">
                </figure>
            </div>

            <div class="contact-content">
                <p class="contact-kicker">Let’s connect</p>
                <h1 class="contact-title">Контакти</h1>

                <div class="contact-card">

                    <a href="https://instagram.com/" target="_blank" class="contact-item">
                        <div class="icon">
                            <i class="fa-brands fa-instagram"></i>
                        </div>
                        <span>anastasia.paskaleva</span>
                    </a>

                    <a href="https://tiktok.com/" target="_blank" class="contact-item">
                        <div class="icon">
                            <i class="fa-brands fa-tiktok"></i>
                        </div>
                        <span>@anastasia</span>
                    </a>

                    <a href="https://youtube.com/" target="_blank" class="contact-item">
                        <div class="icon">
                            <i class="fa-brands fa-youtube"></i>
                        </div>
                        <span>ANARIA</span>
                    </a>

                    <a href="https://t.me/" target="_blank" class="contact-item">
                        <div class="icon">
                            <i class="fa-brands fa-telegram"></i>
                        </div>
                        <span>@anastasia</span>
                    </a>

                    <a href="https://linkedin.com/" target="_blank" class="contact-item">
                        <div class="icon">
                            <i class="fa-brands fa-linkedin"></i>
                        </div>
                        <span>Anastasia Paskaleva</span>
                    </a>

                    <a href="mailto:anastasiatp.business@gmail.com" class="contact-item">
                        <div class="icon">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <span>anastasiatp.business@gmail.com</span>
                    </a>

                </div>

                <p class="contact-note">Open for collaborations, content projects and brand partnerships.</p>
            </div>

        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script src="/nav/nav.js"></script>
    <script src="/footer/footer.js"></script>

</body>

</html>
